# LiteLLM gateway -- Ollama (local, free, no key). Proves the seam with zero
# external dependency. Quality is far below a frontier model: use to validate
# plumbing, not judgment. Requires ollama reachable from the gateway container.
model_list:
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: ollama_chat/qwen3-8b-16k
      api_base: http://host.docker.internal:11434
  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      model: ollama_chat/qwen3-8b-16k
      api_base: http://host.docker.internal:11434
litellm_settings:
  drop_params: true
