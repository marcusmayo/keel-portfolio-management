<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keel — Login</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
  .box { background:#1b1b1b; padding:32px; border-radius:10px; width:300px; text-align:center; }
  h2 { margin:0 0 4px; }
  p { color:#888; font-size:13px; margin:0 0 20px; }
  input { width:100%; box-sizing:border-box; font-size:24px; letter-spacing:6px; text-align:center; padding:12px; border:1px solid #333; border-radius:6px; background:#111; color:#0f0; }
  button { width:100%; margin-top:14px; padding:12px; border:0; border-radius:6px; background:#2563eb; color:#fff; font-size:15px; cursor:pointer; }
  .err { color:#f66; font-size:13px; min-height:18px; margin-top:10px; }
</style>
</head>
<body>
  <div class="box">
    <h2>Keel</h2>
    <p>Enter your 6-digit code</p>
    <input id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" autofocus>
    <button onclick="go()">Unlock</button>
    <div class="err" id="err"></div>
  </div>
<script>
  const inp = document.getElementById('code');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  async function go() {
    const token = inp.value.trim();
    document.getElementById('err').textContent = '';
    try {
      const r = await fetch('/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const d = await r.json();
      if (d.ok) { window.location = '/'; }
      else { document.getElementById('err').textContent = d.error || 'Failed'; inp.value=''; inp.focus(); }
    } catch (e) {
      document.getElementById('err').textContent = 'Connection error';
    }
  }
</script>
</body>
</html>
